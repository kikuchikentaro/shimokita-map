<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>下北半島の生活史マップ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; height: 100vh; display: flex; flex-direction: column; background: #F9FAFB; }

.header { background: #1E3A5F; color: white; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header-title { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
.header-sub { font-size: 10px; opacity: 0.6; margin-top: 1px; }
.header-buttons { display: flex; gap: 6px; }
.header-btn { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 5px 10px; font-size: 11px; cursor: pointer; }
.header-btn:hover { background: rgba(255,255,255,0.25); }

.filters { display: flex; gap: 5px; padding: 7px 12px; background: white; border-bottom: 1px solid #E5E7EB; flex-wrap: wrap; flex-shrink: 0; }
.filter-btn { padding: 3px 9px; border-radius: 12px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 3px; border: 1px solid #D1D5DB; background: white; color: #374151; }
.filter-btn.active { background: #1E3A5F; color: white; border-color: #1E3A5F; }
.filter-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

.main { flex: 1; display: flex; position: relative; overflow: hidden; }
#map { flex: 1; }

.panel { position: absolute; top: 0; right: 0; width: 340px; max-width: 90vw; height: 100%; background: white; border-left: 1px solid #E5E7EB; overflow-y: auto; box-shadow: -4px 0 12px rgba(0,0,0,0.08); z-index: 1000; transition: transform 0.3s ease; }
.panel.sliding-out { transform: translateX(100%); }
.panel-body { padding: 16px; }
.panel-close { position: absolute; top: 10px; right: 12px; background: rgba(0,0,0,0.4); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 16px; cursor: pointer; z-index: 10; }

@media (max-width: 600px) {
  .panel {
    top: auto !important;
    right: 0 !important;
    bottom: 0;
    left: 0;
    width: 100% !important;
    max-width: 100% !important;
    height: 62vh;
    border-left: none;
    border-top: 1px solid #E5E7EB;
    border-radius: 18px 18px 0 0;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
    transform: translateY(0);
    transition: transform 0.3s ease;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .panel.sliding-out { transform: translateY(100%) !important; }
  .panel-drag-handle {
    width: 40px; height: 4px; background: #D1D5DB; border-radius: 2px;
    margin: 10px auto 4px; cursor: grab;
  }
  .panel-close { top: 10px; right: 10px; }
}
.panel-category { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; font-size: 11px; }
.panel-title { font-size: 16px; font-weight: 700; color: #111827; line-height: 1.4; }
.panel-desc { font-size: 13px; color: #374151; line-height: 1.8; margin-top: 14px; white-space: pre-wrap; }
.panel-note { margin-top: 16px; padding: 10px; background: #FFFBEB; border-radius: 8px; font-size: 11px; color: #92400E; line-height: 1.5; }
.panel-meta { font-size: 10px; color: #9CA3AF; margin-top: 10px; }

.photo-item { margin-bottom: 2px; cursor: pointer; }
.photo-item img { width: 100%; display: block; max-height: 220px; object-fit: cover; }
.photo-item .caption { font-size: 11px; color: #6B7280; margin-top: 2px; line-height: 1.5; padding: 2px 16px 8px; }

.list-view { flex: 1; overflow-y: auto; padding: 16px; }
.list-item { background: white; border-radius: 10px; padding: 12px; border: 1px solid #E5E7EB; cursor: pointer; display: flex; gap: 10px; margin-bottom: 10px; }
.list-item:hover { border-color: #93C5FD; }
.list-photo { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
.list-title { font-size: 13px; font-weight: 600; color: #111827; }
.list-desc { font-size: 11px; color: #6B7280; margin-top: 3px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.footer { background: white; border-top: 1px solid #E5E7EB; padding: 6px 16px; display: flex; justify-content: space-between; font-size: 10px; color: #9CA3AF; flex-shrink: 0; }

.loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; z-index: 2000; font-size: 14px; color: #374151; }

/* ===== Lightbox ===== */
.lightbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: none; flex-direction: column; }
.lightbox.active { display: flex; }
.lightbox-header { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; flex-shrink: 0; }
.lightbox-counter { color: rgba(255,255,255,0.7); font-size: 13px; }
.lightbox-close { background: none; border: none; color: white; font-size: 28px; cursor: pointer; padding: 0 8px; }
.lightbox-body { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; touch-action: pan-x pan-y pinch-zoom; }
.lightbox-body img { max-width: 100%; max-height: 100%; object-fit: contain; }
.lightbox-caption { color: rgba(255,255,255,0.85); font-size: 13px; text-align: center; padding: 12px 16px; line-height: 1.5; flex-shrink: 0; min-height: 44px; }
.lightbox-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.15); border: none; color: white; font-size: 28px; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.lightbox-nav:hover { background: rgba(255,255,255,0.3); }
.lightbox-prev { left: 8px; }
.lightbox-next { right: 8px; }
.lightbox-nav.hidden { display: none; }

@media (max-width: 600px) {
  .header-title { font-size: 13px; }
  .lightbox-nav { width: 36px; height: 36px; font-size: 22px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">下北半島の生活史マップ</div>
    <div class="header-sub" id="mode-label"></div>
  </div>
  <div class="header-buttons">
    <button class="header-btn" onclick="reloadData()">↻ 再読込</button>
    <button class="header-btn" id="btn-view" onclick="toggleView()">一覧</button>
  </div>
</div>

<div class="filters" id="filters"></div>

<div class="main">
  <div id="map"></div>
  <div class="list-view" id="list-view" style="display:none"></div>
  <div class="panel" id="detail-panel" style="display:none"></div>
  <div class="loading-overlay" id="loading" style="display:none">データを読み込み中...</div>
</div>

<div class="footer">
  <span>下北半島の生活史プロジェクト｜合同会社まわる社</span>
  <span id="pin-count">0 件のピン</span>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <div class="lightbox-header">
    <span class="lightbox-counter" id="lightbox-counter"></span>
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
  </div>
  <div class="lightbox-body" id="lightbox-body">
    <button class="lightbox-nav lightbox-prev" id="lightbox-prev" onclick="lightboxNav(-1)">‹</button>
    <img id="lightbox-img" src="" alt="">
    <button class="lightbox-nav lightbox-next" id="lightbox-next" onclick="lightboxNav(1)">›</button>
  </div>
  <div class="lightbox-caption" id="lightbox-caption"></div>
</div>

<script>
// ===== CONFIG =====
var SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSj5ek6RFb_CjP8BnusZJEHi58IkhDR8aaRCIptk5vzkH_U9ycTawKjkOL2yKsKjgt31_3_oMpidlIj/pub?gid=0&single=true&output=csv';
var PINS_JSON_URL = './pins.json'; // CMSで書き出したpins.json（存在すれば優先）

// ===== State =====
var pins = [];
var currentView = 'map';
var currentFilter = 'all';
var map, markers = [];

// Lightbox state
var lbPhotos = [];
var lbIndex = 0;

var CATEGORY_COLORS = {
  '語りの場所': '#3B82F6',
  '風景の変遷': '#10B981',
  '聞き取り実施': '#EF4444',
  '8mmフィルム': '#F59E0B',
};

// ===== Helpers =====
function getColor(cat) { return CATEGORY_COLORS[cat] || '#6B7280'; }

function markerIcon(color) {
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 36" width="24" height="36"><path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0z" fill="' + color + '"/><circle cx="12" cy="12" r="5" fill="white"/></svg>';
  return L.icon({
    iconUrl: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
    iconSize: [24, 36], iconAnchor: [12, 36]
  });
}

function parsePhotos(row) {
  // CSV行（photo_url_1〜4形式）からphoto配列を生成
  var photos = [];
  for (var i = 1; i <= 4; i++) {
    var url = (row['photo_url_' + i] || '').trim();
    var caption = (row['caption_' + i] || '').trim();
    if (url) photos.push({ url: url, caption: caption });
  }
  return photos;
}

// ===== Map =====
function initMap() {
  map = L.map('map').setView([41.2931, 141.1831], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);
}

function renderMarkers() {
  markers.forEach(function(m) { map.removeLayer(m); });
  markers = [];
  var filtered = currentFilter === 'all' ? pins : pins.filter(function(p) { return p.category === currentFilter; });
  filtered.forEach(function(pin) {
    if (isNaN(pin.lat) || isNaN(pin.lng)) return;
    var m = L.marker([pin.lat, pin.lng], { icon: markerIcon(getColor(pin.category)) }).addTo(map);
    m.on('click', function() { showDetail(pin); });
    markers.push(m);
  });
  document.getElementById('pin-count').textContent = pins.length + ' 件のピン';
}

// ===== Filters =====
function renderFilters() {
  var cats = [];
  pins.forEach(function(p) { if (cats.indexOf(p.category) === -1) cats.push(p.category); });
  var html = '<button class="filter-btn ' + (currentFilter === 'all' ? 'active' : '') + '" onclick="setFilter(\'all\')">すべて (' + pins.length + ')</button>';
  cats.forEach(function(cat) {
    var c = getColor(cat);
    var count = pins.filter(function(p) { return p.category === cat; }).length;
    var active = currentFilter === cat;
    html += '<button class="filter-btn" style="border-color:' + c + '40;' + (active ? 'background:' + c + ';color:white' : 'color:' + c) + '" onclick="setFilter(\'' + cat + '\')">';
    html += '<span class="filter-dot" style="background:' + (active ? 'white' : c) + '"></span>' + cat + ' (' + count + ')</button>';
  });
  document.getElementById('filters').innerHTML = html;
}

function setFilter(cat) {
  currentFilter = cat;
  renderFilters();
  renderMarkers();
  if (currentView === 'list') renderList();
}

// ===== Lightbox =====
function openLightbox(photos, index) {
  lbPhotos = photos;
  lbIndex = index || 0;
  document.getElementById('lightbox').classList.add('active');
  updateLightbox();
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}

function lightboxNav(dir) {
  lbIndex += dir;
  if (lbIndex < 0) lbIndex = 0;
  if (lbIndex >= lbPhotos.length) lbIndex = lbPhotos.length - 1;
  updateLightbox();
}

function updateLightbox() {
  var photo = lbPhotos[lbIndex];
  document.getElementById('lightbox-img').src = photo.url;
  document.getElementById('lightbox-caption').textContent = photo.caption || '';
  document.getElementById('lightbox-counter').textContent = (lbIndex + 1) + ' / ' + lbPhotos.length;
  document.getElementById('lightbox-prev').className = 'lightbox-nav lightbox-prev' + (lbIndex === 0 ? ' hidden' : '');
  document.getElementById('lightbox-next').className = 'lightbox-nav lightbox-next' + (lbIndex >= lbPhotos.length - 1 ? ' hidden' : '');
}

// Keyboard navigation
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lightboxNav(-1);
  if (e.key === 'ArrowRight') lightboxNav(1);
});

// Swipe support for mobile
(function() {
  var startX = 0;
  var body = document.getElementById('lightbox-body');
  if (!body) return;
  body.addEventListener('touchstart', function(e) {
    if (e.touches.length === 1) startX = e.touches[0].clientX;
  }, { passive: true });
  body.addEventListener('touchend', function(e) {
    if (e.changedTouches.length === 1) {
      var diff = e.changedTouches[0].clientX - startX;
      if (Math.abs(diff) > 50) {
        if (diff < 0) lightboxNav(1);
        else lightboxNav(-1);
      }
    }
  }, { passive: true });
})();

// ===== Detail Panel =====
function showDetail(pin) {
  var panel = document.getElementById('detail-panel');
  panel.classList.remove('sliding-out');
  var isMobile = window.innerWidth <= 600;
  var html = '';
  if (isMobile) {
    html += '<div class="panel-drag-handle" id="panel-drag-handle"></div>';
  }
  html += '<button class="panel-close" onclick="closeDetail()">×</button>';

  if (pin.photos && pin.photos.length > 0) {
    pin.photos.forEach(function(photo, i) {
      html += '<div class="photo-item" onclick="openLightbox(currentDetailPhotos,' + i + ')">';
      html += '<img src="' + photo.url + '" alt="">';
      if (photo.caption) html += '<div class="caption">' + photo.caption + '</div>';
      html += '</div>';
    });
    // Store photos for lightbox access
    window.currentDetailPhotos = pin.photos;
  }

  html += '<div class="panel-body">';
  html += '<div class="panel-category"><span class="filter-dot" style="background:' + getColor(pin.category) + '"></span><span style="color:' + getColor(pin.category) + '">' + pin.category + '</span></div>';
  html += '<div class="panel-title">' + pin.title + '</div>';
  html += '<div class="panel-desc">' + pin.description + '</div>';
  html += '<div class="panel-note">※このピンは語りの断片です。全文は冊子『下北半島の生活史（仮）』でお読みいただけます。</div>';
  if (pin.created_at) html += '<div class="panel-meta">登録日：' + pin.created_at + '</div>';
  html += '<div class="panel-meta">📍 ' + pin.lat.toFixed(4) + ', ' + pin.lng.toFixed(4) + '</div>';
  html += '</div>';

  panel.innerHTML = html;
  panel.style.display = 'block';
  map.setView([pin.lat, pin.lng], 14);
  initPanelSwipe(panel);
}

function closeDetail() {
  var panel = document.getElementById('detail-panel');
  panel.classList.add('sliding-out');
  setTimeout(function() {
    panel.style.display = 'none';
    panel.classList.remove('sliding-out');
  }, 300);
}

function initPanelSwipe(panel) {
  var startY = 0, startX = 0, dragging = false, startScrollTop = 0;

  function onTouchStart(e) {
    // Only handle single-finger on the handle or when scrolled to top
    if (e.touches.length !== 1) return;
    startY = e.touches[0].clientY;
    startX = e.touches[0].clientX;
    startScrollTop = panel.scrollTop;
    dragging = true;
    panel.style.transition = 'none';
  }

  function onTouchMove(e) {
    if (!dragging || e.touches.length !== 1) return;
    var dy = e.touches[0].clientY - startY;
    var dx = e.touches[0].clientX - startX;
    var isMobile = window.innerWidth <= 600;
    if (!isMobile) return;

    // Only allow downward swipe when panel is scrolled to top or using handle
    var fromHandle = e.target.id === 'panel-drag-handle';
    if (dy > 0 && (panel.scrollTop <= 0 || fromHandle)) {
      // Prevent scroll only if dragging down from top
      e.preventDefault();
      panel.style.transform = 'translateY(' + Math.max(0, dy) + 'px)';
    }
  }

  function onTouchEnd(e) {
    if (!dragging) return;
    dragging = false;
    panel.style.transition = '';
    var dy = e.changedTouches[0].clientY - startY;
    var isMobile = window.innerWidth <= 600;
    if (isMobile && dy > 80) {
      // Swipe down enough → close
      closeDetail();
    } else {
      // Snap back
      panel.style.transform = '';
    }
  }

  panel.addEventListener('touchstart', onTouchStart, { passive: true });
  panel.addEventListener('touchmove', onTouchMove, { passive: false });
  panel.addEventListener('touchend', onTouchEnd, { passive: true });
}

// ===== List View =====
function renderList() {
  var filtered = currentFilter === 'all' ? pins : pins.filter(function(p) { return p.category === currentFilter; });
  var container = document.getElementById('list-view');
  if (filtered.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:#9CA3AF">ピンがありません</div>';
    return;
  }
  var html = '';
  filtered.forEach(function(pin, i) {
    var thumb = pin.photos && pin.photos.length > 0 ? pin.photos[0].url : null;
    html += '<div class="list-item" onclick="showDetailAndSwitch(' + i + ')">';
    if (thumb) html += '<img class="list-photo" src="' + thumb + '" alt="">';
    html += '<div style="flex:1;min-width:0">';
    html += '<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">';
    html += '<span class="filter-dot" style="background:' + getColor(pin.category) + '"></span>';
    html += '<span style="font-size:10px;color:' + getColor(pin.category) + '">' + pin.category + '</span>';
    html += '</div>';
    html += '<div class="list-title">' + pin.title + '</div>';
    html += '<div class="list-desc">' + pin.description + '</div>';
    html += '</div></div>';
  });
  container.innerHTML = html;
}

function showDetailAndSwitch(index) {
  var filtered = currentFilter === 'all' ? pins : pins.filter(function(p) { return p.category === currentFilter; });
  var pin = filtered[index];
  if (!pin) return;
  currentView = 'map';
  document.getElementById('map').style.display = 'block';
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('btn-view').textContent = '一覧';
  setTimeout(function() { map.invalidateSize(); showDetail(pin); }, 100);
}

function toggleView() {
  if (currentView === 'map') {
    currentView = 'list';
    document.getElementById('map').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    document.getElementById('btn-view').textContent = '地図';
    document.getElementById('detail-panel').style.display = 'none';
    renderList();
  } else {
    currentView = 'map';
    document.getElementById('map').style.display = 'block';
    document.getElementById('list-view').style.display = 'none';
    document.getElementById('btn-view').textContent = '一覧';
    setTimeout(function() { map.invalidateSize(); }, 100);
  }
}

// ===== Data Loading =====
function applyPins(parsed, source) {
  if (parsed.length === 0) throw new Error('有効なデータが見つかりませんでした');
  pins = parsed;
  document.getElementById('mode-label').textContent = pins.length + ' 件 (' + source + ')';
  renderFilters();
  renderMarkers();
}

function fetchFromJSON(url) {
  document.getElementById('loading').style.display = 'flex';
  return fetch(url + '?v=' + Date.now())
    .then(function(resp) {
      if (!resp.ok) throw new Error('not found');
      return resp.json();
    })
    .then(function(data) {
      if (!Array.isArray(data) || data.length === 0) throw new Error('empty');
      var parsed = data
        .filter(function(p) { return p.title && p.lat && p.lng; })
        .map(function(p) {
          var photos = Array.isArray(p.photos) ? p.photos : [];
          while (photos.length < 4) photos.push({url:'',caption:''});
          return {
            title: (p.title || '').trim(),
            description: (p.description || '').trim(),
            category: (p.category || '語りの場所').trim(),
            lat: parseFloat(p.lat),
            lng: parseFloat(p.lng),
            photos: photos.filter(function(ph){ return ph.url; }),
            created_at: (p.created_at || '').trim()
          };
        });
      applyPins(parsed, 'CMS管理データ');
      document.getElementById('loading').style.display = 'none';
      return true;
    });
}

function fetchFromSheet(url) {
  document.getElementById('loading').style.display = 'flex';
  fetch(url)
    .then(function(resp) {
      if (!resp.ok) throw new Error('データを読み込めませんでした');
      return resp.text();
    })
    .then(function(text) {
      var result = Papa.parse(text, { header: true, skipEmptyLines: true });
      var parsed = result.data
        .filter(function(row) { return row.title && row.lat && row.lng; })
        .map(function(row) {
          return {
            title: (row.title || '').trim(),
            description: (row.description || '').trim(),
            category: (row.category || '語りの場所').trim(),
            lat: parseFloat(row.lat),
            lng: parseFloat(row.lng),
            photos: parsePhotos(row),
            created_at: (row.created_at || '').trim()
          };
        });
      applyPins(parsed, 'スプレッドシート');
    })
    .catch(function(e) {
      document.getElementById('mode-label').textContent = 'エラー: ' + e.message;
    })
    .finally(function() {
      document.getElementById('loading').style.display = 'none';
    });
}

function reloadData() {
  // pins.jsonを優先し、なければスプレッドシートにフォールバック
  fetchFromJSON(PINS_JSON_URL).catch(function() {
    fetchFromSheet(SHEET_CSV_URL);
  });
}

// ===== Init =====
window.addEventListener('DOMContentLoaded', function() {
  initMap();
  reloadData();
});
</script>
</body>
</html>
