
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>下北半島の生活史マップ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; height: 100vh; display: flex; flex-direction: column; background: #F9FAFB; }

.header { background: #1E3A5F; color: white; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header-title { font-size: 15px; font-weight: 700; letter-spacing: 1px; }
.header-sub { font-size: 10px; opacity: 0.6; margin-top: 1px; }
.header-buttons { display: flex; gap: 6px; }
.header-btn { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 6px; padding: 5px 10px; font-size: 11px; cursor: pointer; }
.header-btn:hover { background: rgba(255,255,255,0.25); }

.filters { display: flex; gap: 5px; padding: 7px 12px; background: white; border-bottom: 1px solid #E5E7EB; flex-wrap: wrap; flex-shrink: 0; }
.filter-btn { padding: 3px 9px; border-radius: 12px; font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 3px; border: 1px solid #D1D5DB; background: white; color: #374151; }
.filter-btn.active { background: #1E3A5F; color: white; border-color: #1E3A5F; }
.filter-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }

.main { flex: 1; display: flex; position: relative; overflow: hidden; }
#map { flex: 1; }

.panel { position: absolute; top: 0; right: 0; width: 340px; max-width: 90vw; height: 100%; background: white; border-left: 1px solid #E5E7EB; overflow-y: auto; box-shadow: -4px 0 12px rgba(0,0,0,0.08); z-index: 1000; }
.panel-body { padding: 16px; }
.panel-close { position: absolute; top: 10px; right: 12px; background: rgba(0,0,0,0.4); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 16px; cursor: pointer; z-index: 10; }
.panel-category { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; font-size: 11px; }
.panel-title { font-size: 16px; font-weight: 700; color: #111827; line-height: 1.4; }
.panel-desc { font-size: 13px; color: #374151; line-height: 1.8; margin-top: 14px; white-space: pre-wrap; }
.panel-note { margin-top: 16px; padding: 10px; background: #FFFBEB; border-radius: 8px; font-size: 11px; color: #92400E; line-height: 1.5; }
.panel-meta { font-size: 10px; color: #9CA3AF; margin-top: 10px; }

.photo-item { margin-bottom: 12px; }
.photo-item img { width: 100%; display: block; }
.photo-item .caption { font-size: 11px; color: #6B7280; margin-top: 4px; line-height: 1.5; }
.photo-first img { border-radius: 0; max-height: 220px; object-fit: cover; }
.photo-rest { padding: 0 16px; }
.photo-rest img { border-radius: 8px; max-height: 200px; object-fit: cover; }
.photo-rest .caption { padding: 0; }
.photo-first .caption { padding: 4px 16px 0; }

.list-view { flex: 1; overflow-y: auto; padding: 16px; }
.list-item { background: white; border-radius: 10px; padding: 12px; border: 1px solid #E5E7EB; cursor: pointer; display: flex; gap: 10px; margin-bottom: 10px; }
.list-item:hover { border-color: #93C5FD; }
.list-photo { width: 64px; height: 64px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
.list-title { font-size: 13px; font-weight: 600; color: #111827; }
.list-desc { font-size: 11px; color: #6B7280; margin-top: 3px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.footer { background: white; border-top: 1px solid #E5E7EB; padding: 6px 16px; display: flex; justify-content: space-between; font-size: 10px; color: #9CA3AF; flex-shrink: 0; }

.loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); display: flex; align-items: center; justify-content: center; z-index: 2000; font-size: 14px; color: #374151; }

@media (max-width: 600px) {
  .panel { width: 100%; }
  .header-title { font-size: 13px; }
}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">下北半島の生活史マップ</div>
    <div class="header-sub" id="mode-label"></div>
  </div>
  <div class="header-buttons">
    <button class="header-btn" onclick="reloadData()">↻ 再読込</button>
    <button class="header-btn" id="btn-view" onclick="toggleView()">一覧</button>
  </div>
</div>

<div class="filters" id="filters"></div>

<div class="main">
  <div id="map"></div>
  <div class="list-view" id="list-view" style="display:none"></div>
  <div class="panel" id="detail-panel" style="display:none"></div>
  <div class="loading-overlay" id="loading" style="display:none">データを読み込み中...</div>
</div>

<div class="footer">
  <span>下北半島の生活史プロジェクト｜合同会社まわる社</span>
  <span id="pin-count">0 件のピン</span>
</div>

<script>
// ===== CONFIG =====
// ↓↓↓ ここにCSV公開URLを貼ってください ↓↓↓
const SHEET_CSV_URL = 'ここにCSV公開URLを貼る';
// ↑↑↑ ↑↑↑

// ===== State =====
let pins = [];
let currentView = 'map';
let currentFilter = 'all';
let map, markers = [];

const CATEGORY_COLORS = {
  '語りの場所': '#3B82F6',
  '風景の変遷': '#10B981',
  '聞き取り実施': '#EF4444',
  '8mmフィルム': '#F59E0B',
};

// ===== Helpers =====
function getColor(cat) { return CATEGORY_COLORS[cat] || '#6B7280'; }

function markerIcon(color) {
  const svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 36" width="24" height="36"><path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 24 12 24s12-15 12-24C24 5.4 18.6 0 12 0z" fill="' + color + '"/><circle cx="12" cy="12" r="5" fill="white"/></svg>';
  return L.icon({
    iconUrl: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg),
    iconSize: [24, 36], iconAnchor: [12, 36]
  });
}

function parsePhotos(row) {
  var photos = [];
  for (var i = 1; i <= 4; i++) {
    var url = (row['photo_url_' + i] || '').trim();
    var caption = (row['caption_' + i] || '').trim();
    if (url) photos.push({ url: url, caption: caption });
  }
  return photos;
}

// ===== Map =====
function initMap() {
  map = L.map('map').setView([41.2931, 141.1831], 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);
}

function renderMarkers() {
  markers.forEach(function(m) { map.removeLayer(m); });
  markers = [];
  var filtered = currentFilter === 'all' ? pins : pins.filter(function(p) { return p.category === currentFilter; });
  filtered.forEach(function(pin) {
    if (isNaN(pin.lat) || isNaN(pin.lng)) return;
    var m = L.marker([pin.lat, pin.lng], { icon: markerIcon(getColor(pin.category)) }).addTo(map);
    m.on('click', function() { showDetail(pin); });
    markers.push(m);
  });
  document.getElementById('pin-count').textContent = pins.length + ' 件のピン';
}

// ===== Filters =====
function renderFilters() {
  var cats = [];
  pins.forEach(function(p) { if (cats.indexOf(p.category) === -1) cats.push(p.category); });
  var html = '<button class="filter-btn ' + (currentFilter === 'all' ? 'active' : '') + '" onclick="setFilter(\'all\')">すべて (' + pins.length + ')</button>';
  cats.forEach(function(cat) {
    var c = getColor(cat);
    var count = pins.filter(function(p) { return p.category === cat; }).length;
    var active = currentFilter === cat;
    html += '<button class="filter-btn" style="border-color:' + c + '40;' + (active ? 'background:' + c + ';color:white' : 'color:' + c) + '" onclick="setFilter(\'' + cat + '\')">';
    html += '<span class="filter-dot" style="background:' + (active ? 'white' : c) + '"></span>' + cat + ' (' + count + ')</button>';
  });
  document.getElementById('filters').innerHTML = html;
}

function setFilter(cat) {
  currentFilter = cat;
  renderFilters();
  renderMarkers();
  if (currentView === 'list') renderList();
}

// ===== Detail Panel =====
function showDetail(pin) {
  var panel = document.getElementById('detail-panel');
  var html = '<button class="panel-close" onclick="closeDetail()">×</button>';

  if (pin.photos && pin.photos.length > 0) {
    pin.photos.forEach(function(photo, i) {
      if (i === 0) {
        html += '<div class="photo-item photo-first">';
        html += '<img src="' + photo.url + '" alt="">';
        if (photo.caption) html += '<div class="caption">' + photo.caption + '</div>';
        html += '</div>';
      } else {
        html += '<div class="photo-item photo-rest">';
        html += '<img src="' + photo.url + '" alt="">';
        if (photo.caption) html += '<div class="caption">' + photo.caption + '</div>';
        html += '</div>';
      }
    });
  }

  html += '<div class="panel-body">';
  html += '<div class="panel-category"><span class="filter-dot" style="background:' + getColor(pin.category) + '"></span><span style="color:' + getColor(pin.category) + '">' + pin.category + '</span></div>';
  html += '<div class="panel-title">' + pin.title + '</div>';
  html += '<div class="panel-desc">' + pin.description + '</div>';
  html += '<div class="panel-note">※このピンは語りの断片です。全文は冊子『下北半島の生活史（仮）』でお読みいただけます。</div>';
  if (pin.created_at) html += '<div class="panel-meta">登録日：' + pin.created_at + '</div>';
  html += '<div class="panel-meta">📍 ' + pin.lat.toFixed(4) + ', ' + pin.lng.toFixed(4) + '</div>';
  html += '</div>';

  panel.innerHTML = html;
  panel.style.display = 'block';
  map.setView([pin.lat, pin.lng], 14);
}

function closeDetail() {
  document.getElementById('detail-panel').style.display = 'none';
}

// ===== List View =====
function renderList() {
  var filtered = currentFilter === 'all' ? pins : pins.filter(function(p) { return p.category === currentFilter; });
  var container = document.getElementById('list-view');
  if (filtered.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:#9CA3AF">ピンがありません</div>';
    return;
  }
  var html = '';
  filtered.forEach(function(pin, i) {
    var thumb = pin.photos && pin.photos.length > 0 ? pin.photos[0].url : null;
    html += '<div class="list-item" onclick="showDetailAndSwitch(' + i + ')">';
    if (thumb) html += '<img class="list-photo" src="' + thumb + '" alt="">';
    html += '<div style="flex:1;min-width:0">';
    html += '<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">';
    html += '<span class="filter-dot" style="background:' + getColor(pin.category) + '"></span>';
    html += '<span style="font-size:10px;color:' + getColor(pin.category) + '">' + pin.category + '</span>';
    html += '</div>';
    html += '<div class="list-title">' + pin.title + '</div>';
    html += '<div class="list-desc">' + pin.description + '</div>';
    html += '</div></div>';
  });
  container.innerHTML = html;
}

function showDetailAndSwitch(index) {
  var filtered = currentFilter === 'all' ? pins : pins.filter(function(p) { return p.category === currentFilter; });
  var pin = filtered[index];
  if (!pin) return;
  currentView = 'map';
  document.getElementById('map').style.display = 'block';
  document.getElementById('list-view').style.display = 'none';
  document.getElementById('btn-view').textContent = '一覧';
  setTimeout(function() { map.invalidateSize(); showDetail(pin); }, 100);
}

function toggleView() {
  if (currentView === 'map') {
    currentView = 'list';
    document.getElementById('map').style.display = 'none';
    document.getElementById('list-view').style.display = 'block';
    document.getElementById('btn-view').textContent = '地図';
    document.getElementById('detail-panel').style.display = 'none';
    renderList();
  } else {
    currentView = 'map';
    document.getElementById('map').style.display = 'block';
    document.getElementById('list-view').style.display = 'none';
    document.getElementById('btn-view').textContent = '一覧';
    setTimeout(function() { map.invalidateSize(); }, 100);
  }
}

// ===== Data Loading =====
function fetchFromSheet(url) {
  document.getElementById('loading').style.display = 'flex';
  fetch(url)
    .then(function(resp) {
      if (!resp.ok) throw new Error('データを読み込めませんでした');
      return resp.text();
    })
    .then(function(text) {
      var result = Papa.parse(text, { header: true, skipEmptyLines: true });
      var parsed = result.data
        .filter(function(row) { return row.title && row.lat && row.lng; })
        .map(function(row) {
          return {
            title: (row.title || '').trim(),
            description: (row.description || '').trim(),
            category: (row.category || '語りの場所').trim(),
            lat: parseFloat(row.lat),
            lng: parseFloat(row.lng),
            photos: parsePhotos(row),
            created_at: (row.created_at || '').trim()
          };
        });
      if (parsed.length === 0) throw new Error('有効なデータが見つかりませんでした');
      pins = parsed;
      document.getElementById('mode-label').textContent = pins.length + ' 件のデータを読み込みました';
      renderFilters();
      renderMarkers();
    })
    .catch(function(e) {
      document.getElementById('mode-label').textContent = 'エラー: ' + e.message;
    })
    .finally(function() {
      document.getElementById('loading').style.display = 'none';
    });
}

function reloadData() {
  fetchFromSheet(SHEET_CSV_URL);
}

// ===== Init =====
window.addEventListener('DOMContentLoaded', function() {
  initMap();
  fetchFromSheet(SHEET_CSV_URL);
});
</script>
</body>
</html>
